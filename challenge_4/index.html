<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link
      rel="stylesheet"
      href="./style.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&family=Public+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <title>Frontend Mentor | Results summary component</title>
  </head>
  <body>
    <div class="container">
      <div class="card-1">
        <h4>Your result</h4>
        <div class="score">
          <p class="score-number">
            76 <br />
            <span>of 100</span>
          </p>
        </div>

        <div class="remark">
          <h2>Great</h2>
          <p>
            You scored higher than 65% of the people who have taken these tests.
          </p>
        </div>
      </div>

      <ul class="summary-cards">
        <h3>summary</h3>
        <li class="card1">
          <span class="icons">
            <img
              src="./assets/images/icon-reaction.svg"
              alt=""
            />
            <h5>Reaction</h5>
          </span>

          <span>
            <p>80 <span>/</span> 100</p>
          </span>
        </li>
        <li class="card-2">
          <span class="icons">
            <img
              src="./assets/images/icon-memory.svg"
              alt=""
            />
            <h5>Memory</h5>
          </span>

          <span>
            <p>80 <span>/</span> 100</p>
          </span>
        </li>
        <li class="card-3">
          <span class="icons">
            <img
              src="./assets/images/icon-verbal.svg"
              alt=""
            />
            <h5>Verbal</h5>
          </span>

          <span>
            <p>80 <span>/</span> 100</p>
          </span>
        </li>

        <li class="card-4">
          <span class="icons">
            <img
              src="./assets/images/icon-visual.svg"
              alt=""
            />
            <h5>Visuals</h5>
          </span>

          <span>
            <p>80 <span>/</span> 100</p>
          </span>
        </li>

        <button class="btn">Continue</button>
      </ul>
    </div>
  </body>
</html>
